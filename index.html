<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onbordea Tasks</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<style>
/* ══ Reset ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; height: 100%; overflow: hidden; }
body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

/* ══ Design tokens — Onbordea Heritage Palette ══ */
:root {
  /* Brand */
  --blue: #00BFA5;
  --blue-light: #CCFBF1;
  --blue-hover: #00A896;
  /* Neutrals */
  --gray: #64748B;
  --gray-light: #F8FAFC;
  --gray-mid: #F1F5F9;
  --border: #E2E8F0;
  /* Semantic */
  --error: #EF4444;
  --success: #00BFA5;
  --purple: #9334e6;
  --gold: #f9ab00;
  --orange: #e65100;
  /* Text */
  --text-primary: #1E293B;
  --text-secondary: #64748B;
  --text-tertiary: #94A3B8;
  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 12px;
  --radius-pill: 20px;
  /* Shadows */
  --shadow-sm: 0 4px 6px -1px rgb(0 191 165 / 0.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.18);
  /* Font */
  --font: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  /* Sidebar brand band */
  --brand-bg: #0d1b2a;
}


/* ══ Dark mode ══ */
[data-theme="dark"] {
  --blue:#34D399; --blue-light:#064E3B; --blue-hover:#6EE7B7;
  --gray:#94A3B8; --gray-light:#1E293B; --gray-mid:#0F172A;
  --border:#334155; --error:#F87171; --success:#34D399;
  --purple:#d7aefb; --gold:#fdd663; --orange:#fcad70;
  --text-primary:#F1F5F9; --text-secondary:#94A3B8; --text-tertiary:#475569;
  --brand-bg:#0a1628;
  --md3-surface:#1E293B;
  --md3-surface2:#273549;
  --md3-overlay:rgba(0,0,0,0.7);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 10px 40px rgba(0,0,0,0.5);
}
[data-theme="dark"] body,
[data-theme="dark"] #root,
[data-theme="dark"] .app-root { background:#0F172A; color:#F1F5F9; }

/* Surfaces — main areas */
[data-theme="dark"] .app-main>div,
[data-theme="dark"] .panel-inner { background:#1E293B !important; color:#F1F5F9; }
[data-theme="dark"] .bs-sheet { background:#1E293B !important; color:#F1F5F9; }

/* CORRECCIÓN CRÍTICA: Modales y paneles laterales */
[data-theme="dark"] .modal-surface,
[data-theme="dark"] [data-modal] { background:#1E293B !important; color:#F1F5F9 !important; }
/* Inputs dentro de modales en dark mode */
[data-theme="dark"] .modal-surface input:not([type="checkbox"]):not([type="color"]):not([type="radio"]),
[data-theme="dark"] .modal-surface textarea,
[data-theme="dark"] .modal-surface select { background:#273549 !important; color:#F1F5F9 !important; border-color:#334155 !important; }
/* Secciones internas de modales */
[data-theme="dark"] .modal-surface h3 { color:#F1F5F9 !important; }
[data-theme="dark"] .modal-surface .fade-up { background:#1E293B !important; }

/* Task rows */
[data-theme="dark"] .task-row { color:#F1F5F9; border-bottom-color:#334155 !important; }
[data-theme="dark"] .task-row:hover { background:#273549 !important; }

/* Buttons */
[data-theme="dark"] .btn { background:#273549 !important; color:#94A3B8 !important; border-color:#334155 !important; }
[data-theme="dark"] .btn:hover { background:#2D3F55 !important; }
[data-theme="dark"] .btn-primary { background:var(--blue) !important; color:#0F172A !important; border-color:var(--blue) !important; }
[data-theme="dark"] .btn-ghost { background:transparent !important; border-color:transparent !important; }
[data-theme="dark"] .btn-ghost:hover { background:rgba(255,255,255,0.08) !important; }
[data-theme="dark"] .btn-danger { background:#2D1515 !important; color:#F87171 !important; border-color:#4B2020 !important; }

/* Search bar */
[data-theme="dark"] .search-wrap { background:#273549 !important; border-color:#334155 !important; }
[data-theme="dark"] .search-wrap input { color:#F1F5F9 !important; background:transparent !important; }
[data-theme="dark"] .search-wrap:focus-within { background:#2D3F55 !important; border-color:var(--blue) !important; }

/* Bottom nav */
[data-theme="dark"] .bottom-nav { background:#1E293B !important; border-color:#334155 !important; }

/* Chat bubbles */
[data-theme="dark"] .bubble-me { background:#1e3a2a !important; }
[data-theme="dark"] .bubble-other { background:#35363a !important; }

/* Context banner */
[data-theme="dark"] .ctx-banner { background:#2d2700 !important; border-color:#5f4c00 !important; color:#fdd663 !important; }

/* Inputs — dark mode */
[data-theme="dark"] input:not([type="checkbox"]):not([type="color"]):not([type="radio"]),
[data-theme="dark"] textarea,
[data-theme="dark"] select {
  background:#273549 !important;
  color:#F1F5F9 !important;
  border-color:#334155 !important;
}
[data-theme="dark"] input::placeholder,
[data-theme="dark"] textarea::placeholder { color:#5f6368 !important; }

/* Sidebar items */
[data-theme="dark"] .sb-item { color:#94A3B8 !important; }
[data-theme="dark"] .app-toolbar { background:var(--gray-light) !important; border-bottom-color:var(--border) !important; }
[data-theme="dark"] .sb-item:hover { background:rgba(255,255,255,0.06) !important; }
[data-theme="dark"] .sb-item.active { background:rgba(52,211,153,0.15) !important; color:var(--blue) !important; }

/* Misc */
[data-theme="dark"] .mention-popup { background:#273549 !important; border-color:#334155 !important; }
[data-theme="dark"] .inv-code { background:#273549 !important; border-color:#334155 !important; color:#F1F5F9 !important; }
[data-theme="dark"] .day-chip { background:#273549 !important; border-color:#334155 !important; color:#F1F5F9 !important; }
[data-theme="dark"] .day-chip.on { background:var(--blue) !important; color:#0F172A !important; border-color:var(--blue) !important; }
[data-theme="dark"] .team-card { background:#273549 !important; border-color:#334155 !important; }
[data-theme="dark"] .icon-btn { color:#94A3B8 !important; }
[data-theme="dark"] .icon-btn:hover { background:rgba(255,255,255,0.08) !important; }
[data-theme="dark"] .icon-btn.active { background:rgba(52,211,153,0.15) !important; color:var(--blue) !important; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background:#334155; }

/* ══ DARK MODE — Overrides adicionales para blancos hardcodeados ══ */
/* Lista de tareas y equipo */
[data-theme="dark"] .app-main [style*="background:'#fff'"],
[data-theme="dark"] .app-main [style*='background:"#fff"'],
[data-theme="dark"] .app-main [style*="background: #fff"],
[data-theme="dark"] .app-main [style*="background: rgb(255"] { background:var(--md3-surface,#1E293B) !important; }

/* Kanban cards */
[data-theme="dark"] .kanban-board [style*="background:'#fff'"],
[data-theme="dark"] .kanban-board [style*='background: "#fff"'],
[data-theme="dark"] .kanban-col { background:rgba(30,41,59,0.85) !important; }
/* Kanban task cards individual */
[data-theme="dark"] .kanban-board > div > div > div[style*="background:'#fff'"],
[data-theme="dark"] .kanban-board > div > div > div[style*="background: #fff"] { background:#273549 !important; }

/* Recurrence popup & reminder popup */
[data-theme="dark"] .fade-up[style*="background:'#fff'"],
[data-theme="dark"] .fade-up[style*="background: #fff"],
[data-theme="dark"] [style*="background:'#fff'"][style*="zIndex:500"],
[data-theme="dark"] [style*="background:'#fff'"][style*="zIndex: 500"] {
  background:#273549 !important; color:#F1F5F9 !important;
  border-color:#334155 !important;
}

/* Team view cards */
[data-theme="dark"] .team-card[style*="background:'#fff'"],
[data-theme="dark"] .team-card[style*="background: #fff"] { background:#273549 !important; }

/* Sort/filter inline selects and dropdowns */
[data-theme="dark"] [style*="background:'#fff'"][style*="fontFamily:'var(--font)'"] { background:#273549 !important; }

/* Global fallback: any remaining surface that explicitly sets white background */
[data-theme="dark"] .app-main [style*="background:#fff"],
[data-theme="dark"] .app-toolbar [style*="background:#fff"],
[data-theme="dark"] .flt-menu [style*="background:#fff"] {
  background:#273549 !important;
  color:#F1F5F9 !important;
}
/* Task list scroll area */
[data-theme="dark"] [style*="overflowY:'auto'"][style*="background:'#fff'"],
[data-theme="dark"] [style*="overflowY: auto"][style*="background: #fff"] { background:#1E293B !important; }

/* Detail panel */
[data-theme="dark"] .panel-inner[style*="background:'#fff'"],
[data-theme="dark"] .panel-inner [style*="background:'#fff'"],
[data-theme="dark"] .panel-inner [style*="background:#fff"] { background:#1E293B !important; }

/* Thread panel input row */
[data-theme="dark"] [style*="background:'#fafafa'"] { background:#273549 !important; }
[data-theme="dark"] [style*="background:'#f0f2f5'"] { background:#1E293B !important; }
[data-theme="dark"] [style*="background:'#f8f9fa'"] { background:#273549 !important; }

/* Auth screen */
[data-theme="dark"] .auth-box { background:#1E293B !important; color:#F1F5F9 !important; box-shadow:0 8px 40px rgba(0,0,0,0.5) !important; }
[data-theme="dark"] [style*="linear-gradient(135deg,#f8fafc"] { background:#0F172A !important; }

/* ══ Animations ══ */
.fade-up  { animation: fadeUp  0.18s ease-out; }
.fade-in  { animation: fadeIn  0.15s ease-out; }
/* FIX: panel uses CSS transition on width instead of mount/unmount to prevent layout shift */
@keyframes fadeUp { from { opacity:0; transform:translateY(6px) scale(0.98); } to { opacity:1; transform:none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* ══ Scrollbar ══ */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:#9ca3af; }

/* ══ Auth box ══ */
.auth-box {
  border-top: 4px solid #00BFA5;
}

/* ══ Layout — flex root, no overflow ever ══
   FIX: The thread panel bug was caused by the panel being mounted/unmounted,
   which left the flex container at its old computed width for one frame,
   causing a horizontal scroll flash. Solution: always render the panel wrapper
   but animate its width via CSS transition. The overflow:hidden on both root
   and panel-wrapper prevents any bleed. ══ */
.app-root {
  display: flex;
  width: 100%;
  height: 100vh;
  overflow: hidden;  /* hard stop — nothing escapes this */
  font-family: var(--font);
  color: var(--text-primary);
}
.app-main {
  flex: 1;
  min-width: 0;       /* lets flex child shrink below content width */
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* Panel wrapper: always in DOM, width animated — no layout jump on close */
.panel-wrapper {
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: width 0.2s cubic-bezier(0.4,0,0.2,1);
  /* When closed: width 0, hidden. When open: width set inline by React state. */
}
.panel-wrapper.closed { width: 0 !important; }
.panel-inner {
  /* Inner has the real width so content doesn't collapse weirdly */
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ══ Sidebar brand band ══ */
.sb-brand {
  background: var(--brand-bg);
  padding: 14px 14px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  min-height: 56px;
}
.sb-brand-logo {
  height: 28px;
  width: auto;
  object-fit: contain;
  /* Logo is white — renders correctly on dark bg */
}
.sb-brand-collapsed { justify-content: center; }

/* ══ Sidebar items ══ */
.sb-item {
  border-radius: var(--radius-md);
  margin: 0 4px 1px;
  transition: background 0.1s;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.sb-item:hover { background: rgba(0,191,165,0.06) !important; }
.sb-item.active { background: rgba(0,191,165,0.1) !important; color: #00BFA5; font-weight: 500; }
.sb-item:hover .list-actions { opacity: 1 !important; }

/* ══ Task card rows ══ */
.task-row {
  transition: transform 0.18s cubic-bezier(0.22,1,0.36,1), box-shadow 0.18s, background 0.15s;
  border: 1px solid var(--border) !important;
  border-radius: 12px !important;
  margin: 0 16px 8px !important;
  box-shadow: 0 4px 6px -1px rgb(0 191 165 / 0.05) !important;
  background: #ffffff !important;
}
.task-row .task-actions { opacity:0; transition:opacity 0.12s; }
.task-row:hover .task-actions { opacity:1; }
.task-row:hover {
  background: #ffffff !important;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px -4px rgb(0 191 165 / 0.12), 0 4px 8px -2px rgba(0,0,0,0.06) !important;
}

/* ══ Tooltips ══ */
.tip { position: relative; display: inline-flex; }
.tip::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: #323232; color: #fff; font-size: 11px;
  white-space: nowrap; padding: 4px 8px; border-radius: var(--radius-sm);
  pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 9000;
  font-family: var(--font);
}
.tip:hover::after { opacity: 1; }

/* ══ Day chips ══ */
.day-chip {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; user-select: none;
}
.day-chip.on { background: #00BFA5; color: #fff; border-color: #00BFA5; }
.day-chip:hover:not(.on) { background: var(--blue-light); border-color: var(--blue); }

/* ══ Buttons — unified system ══ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius-md); border: 1px solid var(--border);
  background: #fff; color: var(--text-secondary);
  font-size: 13px; font-weight: 500; font-family: var(--font);
  cursor: pointer; transition: all 0.15s; line-height: 1;
  white-space: nowrap; letter-spacing: -0.01em;
}
.btn:hover { background: var(--gray-light); border-color: #CBD5E1; }
.btn-primary { background: #00BFA5; color: #fff; border-color: #00BFA5; }
.btn-primary:hover { background: #00A896; border-color: #00A896; box-shadow: 0 4px 12px rgba(0,191,165,0.3); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: rgba(0,0,0,0.04); border-color: transparent; }
.btn-danger { background: #FEE2E2; color: #EF4444; border-color: #FECACA; }
.btn-danger:hover { background: #FECACA; border-color: #FCA5A5; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-pill { border-radius: var(--radius-pill); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ══ Icon button ══ */
.icon-btn {
  border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); transition: background 0.12s;
  color: var(--gray);
}
.icon-btn:hover { background: rgba(0,191,165,0.08); }
.icon-btn.active { background: var(--blue-light); color: var(--blue); }

/* ══ Badges ══ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600; line-height: 1.5;
  letter-spacing: 0.01em;
}

/* ══ Tag chips ══ */
.tag-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600; cursor: pointer;
  transition: filter 0.1s;
}
.tag-chip:hover { filter: brightness(0.92); }

/* ══ Search bar ══ */
.search-wrap {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  background: #fff; border-radius: var(--radius-pill);
  border: 1px solid var(--border); transition: all 0.18s;
}
.search-wrap:focus-within {
  border-color: #00BFA5; background: #fff;
  box-shadow: 0 0 0 3px rgba(0,191,165,0.12);
}
.search-wrap input {
  border: none; background: transparent; outline: none;
  font-size: var(--font-size-base); flex: 1; font-family: var(--font);
  color: var(--text-primary); min-width: 0;
}
.search-wrap input::placeholder { color: var(--text-tertiary); }

/* ══ Context banner ══ */
.ctx-banner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 20px; background: #fffbeb;
  border-bottom: 1px solid #fde68a;
  font-size: 12px; color: #92400e; flex-shrink: 0;
  font-weight: 500;
}

/* ══ Chat bubbles ══ */
.bubble-me    { background: #dcf8c6; border-radius: 16px 16px 4px 16px; }
.bubble-other { background: #fff;    border-radius: 16px 16px 16px 4px; }

/* ══ Misc ══ */
input[type="checkbox"] { cursor: pointer; accent-color: #00BFA5; }
input[type="date"], input[type="time"] { cursor: pointer; }
input:not([type="checkbox"]):not([type="color"]):not([type="date"]):not([type="time"]):not([type="number"]):not([type="radio"]),
textarea, select {
  font-family: var(--font);
}
input:not([type="checkbox"]):not([type="color"]):not([type="radio"]),
textarea, select {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #00BFA5 !important;
  box-shadow: 0 0 0 3px rgba(0,191,165,0.1) !important;
}
.inv-code {
  font-family: monospace; letter-spacing: 0.12em;
  background: var(--gray-mid); border-radius: var(--radius-md);
  padding: 4px 10px; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border);
}
.inv-code:hover { background: var(--blue-light); border-color: var(--blue); }
.team-card { transition: all 0.18s; }
.team-card:hover { box-shadow: 0 8px 24px -4px rgb(0 191 165 / 0.15) !important; transform: translateY(-2px); }
.sb-list-item .sb-list-actions { opacity:0; transition:opacity 0.12s; }
.sb-list-item:hover .sb-list-actions { opacity:1; }

/* ══ MOBILE-FIRST — CAMBIO 3 ══ */

/* Bottom Navigation Bar — visible sólo en mobile */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  background: #fff;
  border-top: 1px solid var(--border);
  z-index: 200;
  flex-direction: row;
  align-items: stretch;
  justify-content: space-around;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bn-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; flex: 1; cursor: pointer; border: none; background: none;
  color: var(--text-tertiary); font-size: 10px; font-family: var(--font);
  font-weight: 500; padding: 8px 4px;
  transition: color 0.15s;
}
.bn-item.active { color: var(--blue); }
.bn-item .bn-icon { font-size: 20px; line-height: 1; }
.bn-item .bn-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--blue); margin-top: 2px;
  opacity: 0; transition: opacity 0.15s;
}
.bn-item.active .bn-dot { opacity: 1; }

/* Mobile overlay for sidebar drawer */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 299; backdrop-filter: blur(2px);
}

@media (max-width: 768px) {
  /* Show bottom nav, hide sidebar */
  .bottom-nav { display: flex; }

  /* Sidebar becomes a drawer from the left */
  .app-sidebar-desktop { display: none !important; }
  .app-sidebar-drawer {
    position: fixed !important;
    top: 0; left: -100%; bottom: 0;
    width: 280px !important; min-width: 280px !important; max-width: 280px !important;
    z-index: 300;
    transition: left 0.25s cubic-bezier(0.4,0,0.2,1) !important;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    overflow-y: auto;
  }
  .app-sidebar-drawer.open { left: 0 !important; }
  .sidebar-overlay.open { display: block; }

  /* Shift content up from bottom nav */
  .app-main { padding-bottom: 64px; }

  /* Toolbar: compact on mobile */
  .app-toolbar { padding: 8px 12px !important; gap: 8px !important; }
  .app-toolbar .search-wrap { min-width: 0 !important; flex: 1 !important; }

  /* Kanban board: horizontal swipe with snap */
  .kanban-board {
    flex-wrap: nowrap !important;
    overflow-x: auto !important;
    scroll-snap-type: x mandatory !important;
    -webkit-overflow-scrolling: touch;
    padding: 12px 12px 76px !important;
    gap: 12px !important;
  }
  .kanban-col {
    flex: 0 0 82vw !important;
    min-width: 0 !important;
    scroll-snap-align: center !important;
  }

  /* FAB: lift above bottom nav */
  .fab-btn { bottom: 84px !important; }

const smartDate = (ts, noExpiry) => {
  if (noExpiry) return 'Sin vencimiento';
  if (!ts) return '';
  const now=Date.now(), diff=ts-now, d=new Date(ts);
  const time=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if (diff<0) { const ago=Math.abs(diff); if(ago<3600000)return`Venció hace ${Math.floor(ago/60000)}m`; if(ago<86400000)return`Venció hace ${Math.floor(ago/3600000)}h`; return`Venció ${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')} ${time}`; }
  if (diff<3600000){const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);return`${h}h ${m}m`;}
  const tom=new Date();tom.setDate(tom.getDate()+1);
  if(d.toDateString()===new Date().toDateString())return`Hoy ${time}`;
  if(d.toDateString()===tom.toDateString())return`Mañana ${time}`;
  return`${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')} ${time}`;
};
const fullDate = ts => !ts?'Sin fecha':new Date(ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

const fmtTs = ts => { if(!ts)return''; const d=new Date(ts); return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); };

/* ══ RECURRENCE ══ */
const calcNextTs = (rec,fromTs) => {
  if(!rec||rec.type==='none')return null;
  const d=new Date(fromTs||Date.now()),interval=Math.max(1,rec.interval||1);
  if(rec.type==='daily'){d.setDate(d.getDate()+interval);}
  else if(rec.type==='weekly'){const days=rec.daysOfWeek?.length?[...rec.daysOfWeek].sort():[d.getDay()];d.setDate(d.getDate()+1);for(let i=0;i<7*(interval+1);i++){if(days.includes(d.getDay()))break;d.setDate(d.getDate()+1);}}
  else if(rec.type==='monthly'){d.setMonth(d.getMonth()+interval);if(rec.monthlyType==='day'){d.setDate(Math.min(rec.monthDay||1,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()));}else if(rec.monthlyType==='weekday'){const wd=rec.weekday??1,ord=rec.ordinal||'first';if(ord==='last'){const last=new Date(d.getFullYear(),d.getMonth()+1,0);while(last.getDay()!==wd)last.setDate(last.getDate()-1);d.setDate(last.getDate());}else{const om={first:1,second:2,third:3,fourth:4};let cnt=0,cur=new Date(d.getFullYear(),d.getMonth(),1);while(cnt<(om[ord]||1)){if(cur.getDay()===wd)cnt++;if(cnt<(om[ord]||1))cur.setDate(cur.getDate()+1);}d.setDate(cur.getDate());}}}
  else if(rec.type==='specific'&&rec.specificDate){const sd=new Date(rec.specificDate+'T'+(rec.time||'09:00')+':00');return sd.getTime()>fromTs?sd.getTime():null;}
  if(rec.time){const[h,m]=rec.time.split(':').map(Number);d.setHours(h,m,0,0);}
  return d.getTime();
};
const recLabel = rec => {
  if(!rec||rec.type==='none')return null;
  if(rec.type==='daily')return`Cada ${rec.interval||1} día${(rec.interval||1)>1?'s':''}`;
  if(rec.type==='weekly')return`Semanal${rec.daysOfWeek?.length?` (${rec.daysOfWeek.map(d=>DAY_LABELS[d]).join(' ')})` :''}`;
  if(rec.type==='monthly')return'Mensual';
  if(rec.type==='specific')return'Fecha específica';
  return null;
};

/* ══ SLACK ══ */
/* ══ SLACK — proxy via Netlify Function ══
   El bot token vive en las vars de entorno del servidor.
   El parámetro `token` se mantiene en la firma para no romper
   las llamadas existentes, pero ya no se usa desde el browser. ══ */
const postSlack = async(token,channel,text) => {
  if(!channel||!text)return;
  try{
    const r=await fetch('/api/slack',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({channel,text})
    });
    if(!r.ok){console.warn('Slack proxy HTTP error:',r.status);return;}
    const d=await r.json();
    if(!d.ok)console.warn('Slack API error:',d.error,'| canal:',channel);
  }catch(e){
    console.warn('Slack proxy error:',e);
  }
};
/* ── DM functions ── */
const fmtTime = ts => new Date(ts||Date.now()).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})+'hs';
const notifyAssigneeDM = (token,memberId,task,creator) => {
  if(!memberId)return;
  const p=PRIORITY[task.priority]||PRIORITY.medium;
  const due=task.noExpiry?'Sin vencimiento':`Vence a las ${fmtTime(task.dueTimestamp)}`;
  let msg=`📋 *${creator} te asignó una tarea*\n*${task.title}*\nPrioridad: ${p.emoji} ${p.label}   |   ${due}`;
  if(task.description)msg+=`\n_${task.description}_`;
  postSlack(token,memberId,msg);
};
const notifyCreatorDM = (token,memberId,task,actor,evType,detail) => {
  if(!memberId)return;
  let msg;
  if(evType==='status'){
    if(detail==='completed') msg=`✅ *${actor} completó tu tarea: ${task.title}*\nHora: ${fmtTime(Date.now())}`;
    else msg=`🔄 *${actor} cambió el estado de tu tarea*\n*${task.title}* → ${STATUS[detail]?.label||detail}`;
  } else if(evType==='comment'){
    const firstLines=String(detail).split('\n').slice(0,2).join('\n');
    msg=`💬 *${actor} escribió en tu tarea: ${task.title}*\n"${firstLines}"`;
  } else if(evType==='reassign'){
    msg=`🔀 *${actor} reasignó tu tarea*\n*${task.title}*\n@${detail.from} → @${detail.to}`;
  }
  if(msg)postSlack(token,memberId,msg);
};
/* Notifica al creador solo si el actor no es el creador */
const _notifyCreator=(token,userMap,task,actor,evType,detail)=>{
  if(!task.addedBy||task.addedBy===actor)return;
  const ce=Object.values(userMap).find(u=>u.displayName===task.addedBy);
  if(ce?.slackMemberId)notifyCreatorDM(token,ce.slackMemberId,task,actor,evType,detail);
};

/* Reportes — usa fecha local (fix timezone UTC→AR) + una vez por tipo por día */
const _localDateKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const checkReports = async(cfg,tasks,users,dbRef) => {
  const sched=cfg?.reportSchedule;
  if(!sched||!dbRef)return;
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes(),key=_localDateKey();
  const sentSnap=await get(ref(dbRef,`v3_report_sent/${key}`));
  const sent=sentSnap.val()||{};
  const buildMorning=()=>{const n=Date.now();const lines=[`📊 *Reporte Matutino — ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'})}*`,'━━━━━━━━━━━━━━━━'];users.forEach(u=>{const ut=tasks.filter(t=>t.assignedTo===u);lines.push(`👤 *${u}*: 🟢 ${ut.filter(t=>(t.noExpiry||t.dueTimestamp>=n)&&t.status!=='completed').length} vigentes  |  🔴 ${ut.filter(t=>!t.noExpiry&&t.dueTimestamp<n&&t.status!=='completed').length} vencidas  |  ✅ ${ut.filter(t=>t.status==='completed').length} completadas`);});return lines.join('\n');};
  const buildAfternoon=()=>{const n=Date.now(),tod=new Date();tod.setHours(0,0,0,0);const todTs=tod.getTime();const lines=[`🌆 *Reporte Vespertino — ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long'})}*`,'━━━━━━━━━━━━━━━━'];users.forEach(u=>{const ut=tasks.filter(t=>t.assignedTo===u);lines.push(`👤 *${u}*: ✅ ${ut.filter(t=>t.status==='completed'&&(t.statusLog||[]).some(l=>l.to==='completed'&&l.timestamp>=todTs)).length} hoy  |  ❌ ${ut.filter(t=>!t.noExpiry&&t.dueTimestamp>=todTs&&t.dueTimestamp<n&&t.status!=='completed').length} vencidas hoy  |  📋 ${ut.filter(t=>t.status!=='completed').length} pendientes`);});return lines.join('\n');};
  if(sched.morningEnabled&&sched.morningTime&&!sent.morning){const[h,m]=sched.morningTime.split(':').map(Number);if(nowMin>=h*60+m&&nowMin<h*60+m+1){await update(ref(dbRef,`v3_report_sent/${key}`),{morning:true});postSlack(SLACK_TOKEN,SLACK_TODOLIST_CH,buildMorning());}}
  if(sched.afternoonEnabled&&sched.afternoonTime&&!sent.afternoon){const[h,m]=sched.afternoonTime.split(':').map(Number);if(nowMin>=h*60+m&&nowMin<h*60+m+1){await update(ref(dbRef,`v3_report_sent/${key}`),{afternoon:true});postSlack(SLACK_TOKEN,SLACK_TODOLIST_CH,buildAfternoon());}}
};

  /* ── Task processing ── */

    if(selectedList)base=base.filter(t=>t.listId===selectedList);

    return f.sort((a,b)=>{const d=sortDir==='desc'?-1:1;if(type==='expired')return(b.dueTimestamp||0)-(a.dueTimestamp||0);if(sortBy==='priority'){const c=(PRIORITY[a.priority]?.weight||0)-(PRIORITY[b.priority]?.weight||0);if(c!==0)return c*d;}if(sortBy==='vencimiento'){if(a.noExpiry&&!b.noExpiry)return 1;if(!a.noExpiry&&b.noExpiry)return -1;const c=(a.dueTimestamp||0)-(b.dueTimestamp||0);if(c!==0)return c*d;}return((a.createdAt||0)-(b.createdAt||0))*d;});
  },[tasks,selUser,me,priFilter,filterStatus,statusFlt,sortBy,sortDir,now,tagFilter,searchQ,selectedList]);

  /* ══ TASK ROW ══ */

      React.createElement('div',{style:{paddingTop:'2px',flexShrink:0},onClick:e=>e.stopPropagation()},
